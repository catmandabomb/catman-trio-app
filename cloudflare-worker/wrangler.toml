name = "catman-api"
main = "src/index.js"
compatibility_date = "2024-12-01"

# KV namespace for rate limiting
[[kv_namespaces]]
binding = "CATMAN_RATE"
id = "a5fab539847c4f18a7ad71119947024f"

# D1 database for user accounts + sessions
[[d1_databases]]
binding = "DB"
database_name = "catman-db"
database_id = "e5b6f730-5635-4795-bd0b-6df448d9ca5b"
migrations_dir = "migrations"

# R2 bucket for gig packet files (PDFs, audio, zip bundles)
[[r2_buckets]]
binding = "PACKETS"
bucket_name = "catman-packets"

# Secrets (set via `wrangler secret put <NAME>`):
#   GITHUB_PAT          — GitHub Personal Access Token
#   ENCRYPTION_KEY_SEED — 64-char hex string for AES key derivation
#   DRIVE_API_KEY       — Google Drive API key (for proxying file downloads to gig packets)

# [vars]
# ALLOWED_ORIGIN = "https://catmandabomb.github.io"
